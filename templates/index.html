<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Pixel Squash</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<h1>PIXEL SQUASH</h1>

<div id="startScreen" style="
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:black;
    color:white;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    z-index:9999;
">
    <h1>🎮 Pixel Squash</h1>
    <button onclick="startGame()" style="
        padding:15px 30px;
        font-size:20px;
        cursor:pointer;
    ">
        ▶ Play
    </button>
</div>

<a href="/logout">
        <button style="position:absolute; top:10px; right:10px; padding:10px;">
            Logout
        </button>
    </a>

<canvas id="game" style="display:none;"></canvas>

<div class="panel">
    <p>Score: <span id="score">0</span></p>

    <button onclick="saveScore()">Highscore speichern</button>

    <h2>Top 10</h2>
    <ul id="highscores"></ul>
</div>

<script src="/static/game.js"></script>
</body>
</html>
