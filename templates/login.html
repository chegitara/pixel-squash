<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Pixel Squash</title>

    <style>
        body{
            background:black;
            color:white;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            font-family:Arial;
            flex-direction:column;
        }

        input{
            padding:15px;
            font-size:20px;
            margin-top:20px;
        }

        button{
            padding:15px 30px;
            font-size:20px;
            margin-top:20px;
            cursor:pointer;
        }
    </style>
</head>

<body>

<h1>🎮 PIXEL SQUASH</h1>

<form method="POST">

    <input
        type="text"
        name="username"
        placeholder="Dein Name"
        required
    >

    <br>

    <button type="submit">
        Spielen
    </button>

</form>

</body>
</html>
